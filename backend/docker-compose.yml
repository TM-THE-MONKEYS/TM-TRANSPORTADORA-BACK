services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: tm_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      # Dentro do Docker, Redis não é localhost — é o serviço "redis"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    profiles:
      - full
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: tm_worker
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tm_network

  redis:
    image: redis:7-alpine
    container_name: tm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    profiles:
      - full
    image: nginx:alpine
    container_name: tm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - tm_network

volumes:
  redis_data:
  uploads_data:

networks:
  tm_network:
    driver: bridge
